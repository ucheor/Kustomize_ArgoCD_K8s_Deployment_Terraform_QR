apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: charcoal
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ucheor/Kustomize_ArgoCD_K8s_Deployment_Terraform_QR.git' #update to your repo as appropriate
    path: kustomize-ArgoCD/Dev-Cluster/overlays/charcoal
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev-charcoal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true